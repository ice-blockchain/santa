development: true
logger:
  encoder: console
  level: debug
cmd/santa:
  host: localhost
  version: local
  defaultEndpointTimeout: 30s
  httpServer:
    port: 443
    certPath: cmd/santa/.testdata/localhost.crt
    keyPath: cmd/santa/.testdata/localhost.key
  defaultPagination:
    limit: 20
    maxLimit: 1000
cmd/santa-sleigh:
  host: localhost
  version: local
  defaultEndpointTimeout: 30s
  httpServer:
    port: 1443
    certPath: cmd/santa-sleigh/.testdata/localhost.crt
    keyPath: cmd/santa-sleigh/.testdata/localhost.key
achievements:
  db:
    spaces:
      - BADGES
    urls:
      - localhost:3301
    user: admin
    password: pass
  messageBroker:
    consumerGroup: santa-local
    createTopics: true
    urls:
      - localhost:9094
    topics:
      - name: achievements-tasks
        partitions: 10
        replicationFactor: 1
        retention: 1000h
      - name: achievements-badges
        partitions: 10
        replicationFactor: 1
        retention: 1000h
        ### The next topics are not owned by this service, but are needed to be created for the local/test environment.
      - name: users-events
        partitions: 10
        replicationFactor: 1
        retention: 1000h
      - name: economy-mining
        partitions: 10
        replicationFactor: 1
        retention: 1000h
    consumingTopics:
      - users-events # user creation, modification and deletion events
      - economy-mining # start/stop mining events
      - achievements-tasks # achieved tasks by the user
      - achievements-badges # achieved badges by the user